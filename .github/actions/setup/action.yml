name: Setup RelightLab Dependencies
description: Install Qt, MSVC, dependencies, and setup ccache

inputs:
  qt_version:
    description: 'Qt version to install'
    required: true

  windows_deps:
    description: 'vcpkg packages to install'
    required: false
    default: "opencv[core,calib3d]:x64-windows-static-md lcms2:x64-windows libpng:x64-windows zlib:x64-windows"

runs:
  using: composite
  steps:
    - name: Setup MSVC
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ github.ref }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        cache: 'true'
        version: ${{ inputs.qt_version }}

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mesa-common-dev libglu1-mesa-dev 
        sudo apt-get install -y cmake ninja-build patchelf fuse libjpeg-dev libeigen3-dev
        sudo apt-get install -y libxcb-cursor0
        sudo apt-get install -y liblcms2-dev libpng-dev libraw-dev
        sudo apt-get install -y --no-install-recommends libopencv-dev

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install coreutils libomp eigen libjpeg libpng libraw opencv
        npm install -g appdmg

    - name: Get Current Month
      id: date
      shell: bash
      # This creates a string like "2026-05"
      run: echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

    - name: Restore vcpkg Cache
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg/installed
        # Key changes only when the month changes or you change the dependency list string
        key: vcpkg-Windows-${{ steps.date.outputs.month }}-${{ hashFiles('.github/workflows/*.yml') }}
        restore-keys: |
          vcpkg-Windows-${{ steps.date.outputs.month }}-

    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      shell: bash
      run: |
        vcpkg install ${{ inputs.windows_deps }}
        choco install nsis -y



