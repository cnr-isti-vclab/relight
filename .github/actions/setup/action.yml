name: Setup RelightLab Dependencies
description: Install Qt, MSVC, dependencies, and setup ccache

inputs:
  qt_version:
    description: 'Qt version to install'
    required: true

  windows_deps:
    description: 'vcpkg packages to install'
    required: false
    default: |
      opencv[core,calib3d]:x64-windows-static-md
      lcms2:x64-windows
      libpng:x64-windows
      zlib:x64-windows

runs:
  using: composite
  steps:
    - name: Setup MSVC
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ github.ref }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        cache: 'true'
        version: ${{ inputs.qt_version }}

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mesa-common-dev libglu1-mesa-dev 
        sudo apt-get install -y cmake ninja-build patchelf fuse libjpeg-dev libeigen3-dev
        sudo apt-get install -y libxcb-cursor0
        sudo apt-get install -y liblcms2-dev libpng-dev libraw-dev
        sudo apt-get install -y --no-install-recommends libopencv-dev

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install coreutils libomp eigen libjpeg libpng libraw opencv
        npm install -g appdmg

    - name: Generate Version-Aware Cache Key
      if: runner.os == 'Windows'
      id: set_key
      shell: bash
      run: |
        # 1. Sanitize the dependency list for the key name
        CLEAN_NAME=$(echo '${{ inputs.windows_deps }}' | tr '[],' '-' | sed 's/--\+/-/g')
        
        # 2. Get a unique hash from vcpkg for these specific dependencies
        # We look at the 'version' file in each port directory to create a combined hash
        VCPKG_ROOT_DIR="C:/vcpkg"
        VERSION_HASH=$(echo "${{ inputs.windows_deps }}" | tr ',' '\n' | sed 's/[\[:].*//' | xargs -I {} sha256sum "$VCPKG_ROOT_DIR/ports/{}/vcpkg.json" | sha256sum | cut -d' ' -f1)
        
        echo "key=vcpkg-${{ runner.os }}-$CLEAN_NAME-$VERSION_HASH" >> $GITHUB_OUTPUT

    - name: Cache vcpkg
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: C:/vcpkg/installed
        key: ${{ steps.set_key.outputs.key }}

    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "${{ inputs.windows_deps }}" | xargs vcpkg install
        choco install nsis -y



